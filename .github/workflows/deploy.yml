name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_PRIVATE_KEY"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          SSH_PORT="${EC2_PORT:-22}"
          APP_DIR="${EC2_APP_DIR:-/home/ubuntu/updin-api}"

          ssh-keyscan -p "$SSH_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

          ssh -p "$SSH_PORT" "$EC2_USER@$EC2_HOST" \
            "cd '$APP_DIR' && chmod +x scripts/deploy.sh && APP_DIR='$APP_DIR' ./scripts/deploy.sh '$DEPLOY_BRANCH'"
